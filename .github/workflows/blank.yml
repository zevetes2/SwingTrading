name: Actualización de Portafolio y Análisis Swing

on:
  schedule:
    # Se ejecuta cada 30 min (minutos 0 y 30) de 13:00 a 20:00 UTC
    # Esto equivale a 9:00 am - 4:00 pm en República Dominicana
    - cron: '0,30 13-20 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # Se eliminó la línea de cache para evitar el error de requirements.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client yfinance pandas numpy matplotlib

      - name: Crear archivo de credenciales
        run: |
          echo "${{ secrets.GCP_CREDENTIALS }}" > principios.json

      - name: Ejecutar análisis de Trading
        # IMPORTANTE: Asegúrate de que el nombre del archivo sea exactamente "Swing Trading.py"
        run: python "Swing Trading.py"

      - name: Guardar Gráficas Generadas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graficas-swing-trading
          path: "*.png"
          retention-days: 5
