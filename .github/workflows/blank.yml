name: Actualización de Portafolio y Análisis Swing

on:
  schedule:
    # Se ejecuta todos los días a las 00:00 UTC
    - cron: '0,30 13-20 * * 1-5'
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client yfinance pandas numpy matplotlib

      - name: Crear archivo de credenciales
        run: |
          echo "${{ secrets.GCP_CREDENTIALS }}" > principios.json

      - name: Ejecutar análisis de Trading
        run: python Swing Trading.py 
        # Asegúrate de que el nombre coincida con tu archivo .py

      - name: Guardar Gráficas Generadas (Top Setups)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graficas-swing-trading
          path: "*.png"
          retention-days: 5
